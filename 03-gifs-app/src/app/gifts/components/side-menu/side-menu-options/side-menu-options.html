<div id="nav" class="w-full px-6">
	@for (menuOption of menuOptions; track menuOption.route) {
	<a
		[routerLink]="menuOption.route"
		routerLinkActive="bg-blue-800"
		class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150"
	>
		<div>
			<i [class]="menuOption.icon"></i>
		</div>
		<div class="flex flex-col">
			<span class="text-lg font-bold leading-5 text-white"
				>{{ menuOption.label }}</span
			>
			<span class="text-sm text-white/50 hidden md:block"
				>{{ menuOption.subLabel }}
			</span>
		</div>
	</a>
	} @if (gifsService.searchHistoryKeys().length > 0) {
	<div
		class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 transition ease-linear duration-150"
	>
		<div class="flex flex-col">
			<span class="text-lg font-bold leading-5 text-white">Recent Searches</span>
		</div>
	</div>
	@for (history of gifsService.searchHistoryKeys(); track history) {
	<a
		[routerLink]="['/dashboard/search', history]"
		routerLinkActive="bg-blue-800"
		class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-blue-800transition ease-linear duration-150"
	>
		<div>
			<i class="fa-solid fa-clock-rotate-left"></i>
		</div>
		<div class="flex flex-col">
			<span class="text-lg font-bold leading-5 text-white">{{ history }}</span>
		</div>
	</a>
	} }
</div>
