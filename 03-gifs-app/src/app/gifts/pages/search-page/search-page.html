<h2 class="text-2xl font-bold mt-5">Search Gifs</h2>
<h3 class="text-lg text-gray-600">Search gifs by name, description, or tags</h3>
<section class="flex flex-col gap-4 mb-4">
	<input
		class="border border-gray-300 rounded-lg p-2 mt-3"
		type="text"
		placeholder="Search gifs"
		(keyup.enter)="onSearch(txtSearch.value)"
		#txtSearch
	/>
	<button
		(click)="onSearch(txtSearch.value)"
		class="bg-blue-500 text-white rounded-lg p-2 cursor-pointer"
	>
		Search
	</button>
</section>

<section class="grid">
	<gifs-list [gifs]="gifs()" />
</section>
