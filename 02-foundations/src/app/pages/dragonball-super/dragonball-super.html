<h1>Dragonball Super</h1>
<hr />

<section class="row">
  <div class="col-s12 col-sm-6">
    <dragonball-character-add-form
      (newCharacter)="dragonballService.addCharacter($event)"
    />
  </div>
  <div class="col-12 col-sm-6">
    <dragonball-character-list
      listName="Characters List"
      [characters]="dragonballService.characters()" 
    />
  </div>
</section>
