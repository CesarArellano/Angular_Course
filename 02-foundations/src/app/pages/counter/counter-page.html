<div>
  <h1>Counter Page</h1>
  <p>Counter: {{ counter }}</p>
  <p>Counter Signal: {{ counterSignal() }}</p>
  <button class="btn btn-primary me-2" (click)="increaseBy()">+1</button>
  <button class="btn btn-primary me-2" (click)="increaseBy(-1)">-1</button>
  <button class="btn btn-primary" (click)="reset()">Reset</button>
</div>
