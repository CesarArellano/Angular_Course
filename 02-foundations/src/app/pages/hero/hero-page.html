<div>
  <h1>{{ name() }}</h1>

  <dl>
    <dt>Name:</dt>
    <dd>{{ name() }}</dd>

    <dt>Age:</dt>
    <dd>{{ age() }}</dd>

    <dt>Method:</dt>
    <dd>{{ heroDescription() }}</dd>

    <dt>Capitalized:</dt>
    <!-- <dd>{{ capitalizeName() }}</dd> -->
    <dd>{{ name() | uppercase}}</dd>
    <dd>{{ name() | lowercase}}</dd>
  </dl>

  <button (click)="changeHero()" class="btn btn-primary mx-2">
    Change name
  </button>

  <button class="btn btn-primary">Change age</button>

  <button (click)="resetForm()" class="btn btn-secondary mx-2">Reset</button>
</div>
