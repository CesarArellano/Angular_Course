<div class="p-4">
  <h1>{{ name() }}</h1>

  <dl>
    <dt>Nombre:</dt>
    <dd>{{ name() }}</dd>

    <dt>Edad:</dt>
    <dd>{{ age() }}</dd>

    <dt>Método:</dt>
    <dd>{{ heroDescription }}</dd>

    <dt>Capitalizado:</dt>
    <dd>{{ name().toUpperCase() }}</dd>
  </dl>

  <button (click)="changeHero()" class="btn btn-primary mx-2">
    Cambiar nombre
  </button>

  <button class="btn btn-primary">Cambiar edad</button>

  <button (click)="resetForm()" class="btn btn-secondary mx-2">Reset</button>
</div>
