<h1>Dragonball Super</h1>
<hr />

<section class="row">
  <div class="col-s12 col-sm-6">
    <h3>Add: {{ name() }}</h3>
    <input
      #nameInput
      [value]="name()"
      (change)="name.set(nameInput.value)"
      (input)="name.set(nameInput.value)"
      type="text" 
      class="form-control mt-2" 
      placeholder="Name">
    <input 
      #powerInput
      [value]="power()"
      (change)="power.set(+powerInput.value)"
      type="number" 
      class="form-control mt-2" 
      placeholder="Power">
    <button (click)="addCharacter()" class="btn btn-primary mt-2">Add</button>
  </div>
  <div class="col-12 col-sm-6">
    <dragonball-character-list [characters]="characters()" />
  </div>
</section>
