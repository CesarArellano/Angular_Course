<section class="flex flex-row gap-2 mt-1">
  <input
    type="text"
    class="input input-bordered mx-6 w-56"
    [placeholder]="placeholder()"
    autofocus
    #txtSearch
    (keyup.enter)="onSearch(txtSearch.value)"
  />
  <button class="btn btn-primary" (click)="onSearch(txtSearch.value)">Search</button>
</section>
